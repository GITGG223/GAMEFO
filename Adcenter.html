<style>

/* Global navbar */
#global-navbar {
  position: fixed;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 9999;
  pointer-events: auto;
  font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
}

/* Container look */
#global-navbar .nav-list {
  display: flex;
  gap: 8px;
  margin: 0;
  padding: 6px;
  list-style: none;
  background: rgba(255,255,255,0.02);
  border-radius: 10px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.25);
  backdrop-filter: blur(6px);
}

/* Button style */
#global-navbar .nav-item a {
  display: inline-block;
  padding: 10px 18px;
  color: #fff;
  text-decoration: none;
  font-weight: 600;
  border-radius: 6px;
  transition: transform .12s ease, box-shadow .12s ease;
  white-space: nowrap;
}

/* Default (yellow) buttons */
#global-navbar .nav-item:not(.active) a {
  background: linear-gradient(180deg,#f6c84c,#f0b92a);
  color: #111;
  box-shadow: 0 3px 0 rgba(0,0,0,0.12);
}

/* Active (gray) button */
#global-navbar .nav-item.active a {
  background: linear-gradient(180deg,#9aa0a6,#6f757a);
  color: #fff;
  box-shadow: 0 3px 0 rgba(0,0,0,0.18);
}

/* Hover/focus */
#global-navbar .nav-item a:hover,
#global-navbar .nav-item a:focus {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(0,0,0,0.25);
  outline: none;
}

/* Small screens: allow wrapping and full-width look */
@media (max-width: 640px) {
  #global-navbar {
    width: calc(100% - 20px);
    left: 50%;
    transform: translateX(-50%);
  }
  #global-navbar .nav-list {
    justify-content: center;
    flex-wrap: wrap;
    gap: 6px;
    padding: 8px;
  }
  #global-navbar .nav-item a {
    padding: 8px 12px;
    font-size: 14px;
  }
}
