<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GAMEFO</title>
  <style>
    /* Page reset */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* Fullscreen container */
    html, body {
      height: 100%;
      background: linear-gradient(135deg, #0f172a 0%, #0b1220 50%, #071029 100%);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      color: #000000;
    }

    .splash {
      height: 100%;
      display: grid;
      place-items: center;
      overflow: hidden;
      position: relative;
    }

    /* Subtle animated background shapes */
    .bg-shape {
      position: absolute;
      width: 120vmax;
      height: 120vmax;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) rotate(25deg);
      background: radial-gradient(circle at 30% 30%, rgba(99,102,241,0.12), transparent 15%),
                  radial-gradient(circle at 70% 70%, rgba(16,185,129,0.08), transparent 20%);
      filter: blur(40px);
      animation: float 6s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes float {
      0% { transform: translate(-50%, -50%) rotate(25deg) scale(1); }
      50% { transform: translate(-50%, -52%) rotate(23deg) scale(1.03); }
      100% { transform: translate(-50%, -50%) rotate(25deg) scale(1); }
    }

    /* Logo wrapper */
    .logo-wrap {
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(6px);
      box-shadow: 0 10px 30px rgba(2,6,23,0.6), inset 0 1px 0 rgba(255,255,255,0.02);
      animation: popIn 0.9s cubic-bezier(.2,.9,.3,1) forwards;
    }

    .logo-wrap img {
      width: 58%;
      height: auto;
      display: block;
      transform-origin: center;
      opacity: 0;
      animation: logoAppear 0.9s 0.15s cubic-bezier(.2,.9,.3,1) forwards;
    }

    @keyframes popIn {
      0% { transform: scale(0.6); opacity: 0; }
      60% { transform: scale(1.08); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes logoAppear {
      0% { transform: scale(0.8) rotate(-6deg); opacity: 0; filter: blur(6px); }
      100% { transform: scale(1) rotate(0deg); opacity: 1; filter: blur(0); }
    }

    /* Fade out before redirect */
    .fade-out {
      animation: fadeOut 0.45s ease-in forwards;
    }

    @keyframes fadeOut {
      to { opacity: 0; transform: scale(0.98); }
    }

    /* Small caption (optional) */
    .caption {
      margin-top: 18px;
      font-size: 14px;
      color: rgba(255,255,255,0.72);
      text-align: center;
      letter-spacing: 0.02em;
      z-index: 2;
      opacity: 0;
      animation: captionIn 0.9s 0.25s forwards;
    }

    @keyframes captionIn {
      to { opacity: 1; }
    }

    /* Accessibility: reduce motion preference */
    @media (prefers-reduced-motion: reduce) {
      .bg-shape, .logo-wrap, .logo-wrap img, .caption { animation: none; transform: none; }
    }
  </style>
</head>
<body>
  <div class="splash" id="splash">
    <div class="bg-shape" aria-hidden="true"></div>

    <div style="text-align:center; z-index:2;">
      <div class="logo-wrap" id="logoWrap" aria-hidden="false">
        <!-- Replace logo.png with your logo file or SVG -->
        <img src="Logo.png" alt="Company logo" id="logoImg" />
      </div>
      <div class="caption" aria-hidden="true">Loading…</div>
    </div>
  </div>

  <script>
    // **Redirect after 3 seconds**
    const redirectAfterMs = 3000; // change if you want a different delay
    const targetUrl = 'GAMEFO.html'; // change to your destination

    // Optional: add fade-out just before redirect for a smoother transition
    setTimeout(() => {
      const splash = document.getElementById('splash');
      splash.classList.add('fade-out');
      // wait for fade animation to finish then redirect
      setTimeout(() => {
        window.location.href = targetUrl;
      }, 450);
    }, redirectAfterMs);
  </script>
</body>
</html>
